name: Deploy to Railway (manual fallback)

on:
  workflow_dispatch:

# Automatic deploys are currently handled by Railway Auto Deploy.
# This workflow remains as a manual fallback only.

jobs:
  # ─── Backend ───────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (${{ github.ref_name == 'main' && 'production' || 'development' }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        working-directory: ./backend
        run: railway up --service ${{ vars.RAILWAY_BACKEND_SERVICE }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─── Frontend ──────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (${{ github.ref_name == 'main' && 'production' || 'development' }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    needs: deploy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend to Railway
        working-directory: ./frontend
        run: railway up --service ${{ vars.RAILWAY_FRONTEND_SERVICE }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
