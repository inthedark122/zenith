name: Deploy Trading Worker to Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'

# Prevent concurrent deploys — queue instead of cancelling in-progress.
concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  # ─── Build & push image ────────────────────────────────────────────────────
  build:
    name: Build & Push Worker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zenith-worker
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── Deploy to Hetzner ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hetzner SGP1
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: GHCR_PAT,GITHUB_REPO_OWNER
          script: |
            set -e
            cd /opt/zenith-worker
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GITHUB_REPO_OWNER" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            docker logout ghcr.io
