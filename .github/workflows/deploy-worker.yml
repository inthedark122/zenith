name: Deploy Trading Worker to GCP

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

# Queue deploys — never cancel in progress (a running worker must finish restarting)
concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  # ─── Build & push image to Artifact Registry ───────────────────────────────
  build:
    name: Build & Push Worker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF — no stored keys)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push (SHA tag + latest)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./worker/Dockerfile
          push: true
          tags: |
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/zenith/zenith-worker:latest
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/zenith/zenith-worker:${{ github.sha }}

  # ─── Deploy to GCP Compute Engine via IAP SSH ──────────────────────────────
  deploy:
    name: Deploy to GCP Compute Engine
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: beta   # needed for IAP TCP tunneling

      - name: Ensure /opt/zenith-worker exists on VM
        run: |
          gcloud compute ssh zenith-worker \
            --zone=${{ vars.GCP_ZONE }} \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --strict-host-key-checking=no \
            --quiet \
            --command="sudo mkdir -p /opt/zenith-worker"

      - name: Copy docker-compose.yml to VM
        run: |
          gcloud compute scp worker/docker-compose.yml \
            zenith-worker:/opt/zenith-worker/docker-compose.yml \
            --zone=${{ vars.GCP_ZONE }} \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --strict-host-key-checking=no \
            --quiet

      - name: Deploy worker (pin to this commit's image)
        run: |
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/zenith/zenith-worker:${{ github.sha }}"
          gcloud compute ssh zenith-worker \
            --zone=${{ vars.GCP_ZONE }} \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --strict-host-key-checking=no \
            --quiet \
            --command="
              set -e
              # Pin to the exact image built by this commit
              sudo sed -i 's|^WORKER_IMAGE=.*|WORKER_IMAGE=$IMAGE|' /opt/zenith-worker/.env
              sudo docker compose -f /opt/zenith-worker/docker-compose.yml \
                --env-file /opt/zenith-worker/.env pull
              sudo docker compose -f /opt/zenith-worker/docker-compose.yml \
                --env-file /opt/zenith-worker/.env up -d --remove-orphans
              sudo docker image prune -f
            "

