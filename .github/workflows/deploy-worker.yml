name: Deploy Trading Worker to GCP

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

# Queue deploys — never cancel in progress (a running worker must finish restarting)
concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  # ─── Build & push image to Artifact Registry ───────────────────────────────
  build:
    name: Build & Push Worker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF — no stored keys)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push (SHA tag + latest)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./worker/Dockerfile
          push: true
          tags: |
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/zenith/zenith-worker:latest
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/zenith/zenith-worker:${{ github.sha }}

  # ─── Deploy to GCP Compute Engine (COS update-container) ──────────────────
  deploy:
    name: Deploy to GCP Compute Engine
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Update container image on VM
        run: |
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/zenith/zenith-worker:${{ github.sha }}"
          gcloud compute instances update-container zenith-worker \
            --zone=${{ vars.GCP_ZONE }} \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --container-image="$IMAGE"
