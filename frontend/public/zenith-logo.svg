<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80" width="140" height="80">
  <!-- Background circle -->
  <circle cx="50" cy="38" r="34" fill="#0d1b3e" opacity="0.9"/>
  <circle cx="50" cy="38" r="34" fill="none" stroke="#1e3a6e" stroke-width="1.5"/>

  <!-- Stars / sparkles -->
  <circle cx="20" cy="14" r="1.5" fill="#f9a825"/>
  <circle cx="82" cy="10" r="1" fill="#f9a825"/>
  <circle cx="88" cy="22" r="1.5" fill="#fff"/>
  <circle cx="15" cy="28" r="1" fill="#fff"/>

  <!-- Astronaut helmet -->
  <ellipse cx="50" cy="28" rx="13" ry="14" fill="#1565c0"/>
  <ellipse cx="50" cy="27" rx="9" ry="10" fill="#bbdefb" opacity="0.9"/>
  <!-- Visor glint -->
  <ellipse cx="47" cy="24" rx="3" ry="4" fill="#e3f2fd" opacity="0.7"/>

  <!-- Astronaut body -->
  <rect x="38" y="40" width="24" height="14" rx="7" fill="#1565c0"/>
  <rect x="42" y="42" width="16" height="8" rx="4" fill="#0d47a1"/>

  <!-- Suit highlight -->
  <rect x="45" y="43" width="10" height="5" rx="2.5" fill="#2196f3" opacity="0.5"/>

  <!-- Left arm -->
  <ellipse cx="35" cy="47" rx="5" ry="3" fill="#1565c0" transform="rotate(-30 35 47)"/>
  <!-- Right arm -->
  <ellipse cx="65" cy="47" rx="5" ry="3" fill="#1565c0" transform="rotate(30 65 47)"/>

  <!-- Legs -->
  <rect x="42" y="54" width="6" height="8" rx="3" fill="#1565c0"/>
  <rect x="52" y="54" width="6" height="8" rx="3" fill="#1565c0"/>

  <!-- Candlestick chart behind astronaut -->
  <line x1="20" y1="62" x2="20" y2="72" stroke="#f9a825" stroke-width="1.5"/>
  <rect x="17" y="64" width="6" height="5" rx="0.5" fill="#f9a825"/>
  <line x1="28" y1="58" x2="28" y2="72" stroke="#4caf50" stroke-width="1.5"/>
  <rect x="25" y="60" width="6" height="7" rx="0.5" fill="#4caf50"/>
  <line x1="36" y1="60" x2="36" y2="72" stroke="#f44336" stroke-width="1.5"/>
  <rect x="33" y="62" width="6" height="6" rx="0.5" fill="#f44336"/>

  <!-- ZenithCrypto text -->
  <defs>
    <style>.logo-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 700; text-anchor: middle; }</style>
  </defs>
  <text x="96" y="38" class="logo-text" fill="#ffffff">Zenith</text>
  <text x="96" y="54" class="logo-text" fill="#f9a825">Crypto</text>
</svg>
